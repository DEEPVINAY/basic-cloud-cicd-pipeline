steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build','-t','asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-app-repo/app-image','.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push','asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-app-repo/app-image']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - deploy
  - cloud-app
  - --image
  - asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-app-repo/app-image
  - --region
  - asia-south1
  - --platform
  - managed
  - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY